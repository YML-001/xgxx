<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
  /* 设计稿占位：图表槽位 */
  .chart-slot{display:flex;flex-direction:column;align-items:center;justify-content:center;
    border:1.5px dashed #cbd5e1;border-radius:14px;background:#f6f9fb;color:#94a3b8;
    font-size:12px;gap:4px;text-align:center;margin:auto}
  .chart-slot small{font-size:10px;opacity:.75}
  .page-stub-note{position:fixed;right:14px;bottom:12px;z-index:60;background:rgba(15,23,42,.82);
    color:#fff;font-size:11px;line-height:1.4;padding:7px 11px;border-radius:9px;
    font-family:-apple-system,"PingFang SC",sans-serif;box-shadow:0 6px 18px -6px rgba(0,0,0,.4);pointer-events:none}
</style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-icon">工</div>
        <div class="brand-text"><h1>学工信箱</h1><p>接诉即办 · 件件有回音</p></div>
      </div>
      <nav class="nav-group" id="sidebar-nav">
        <div class="nav-section-title">常用</div>
        <button class="nav-item" onclick="location.href='student-home.html'"><span class="nav-ico"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;display:inline-block;vertical-align:-0.14em"><path d="M4 10.5 12 4l8 6.5"/><path d="M6 9.8V20h12V9.8"/></svg></span><span>工作台</span></button>
        <button class="nav-item active" onclick="location.href='student-write.html'"><span class="nav-ico"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;display:inline-block;vertical-align:-0.14em"><path d="M12.5 20H20"/><path d="M15.5 4.5a2 2 0 0 1 3 3L8 18l-4 1 1-4z"/></svg></span><span>我要写信</span></button>
        <button class="nav-item" onclick="location.href='student-my.html'"><span class="nav-ico"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;display:inline-block;vertical-align:-0.14em"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3.5 7 8.5 6 8.5-6"/></svg></span><span>我的信件</span><span class="nav-badge">3</span></button>
        <button class="nav-item" onclick="location.href='student-query.html'"><span class="nav-ico"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;display:inline-block;vertical-align:-0.14em"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg></span><span>信件查询</span></button>
        <div class="nav-section-title">信息公开</div>
        <button class="nav-item" onclick="location.href='student-public.html'"><span class="nav-ico"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;display:inline-block;vertical-align:-0.14em"><path d="M4 10v4a1 1 0 0 0 1 1h2l5 4V5L7 9H5a1 1 0 0 0-1 1z"/><path d="M16 9a4.5 4.5 0 0 1 0 6"/></svg></span><span>公开信件</span></button>
        <button class="nav-item" onclick="location.href='student-policy.html'"><span class="nav-ico"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;display:inline-block;vertical-align:-0.14em"><path d="M6 2.5h7l5 5V21.5H6z"/><path d="M13 2.5V8h5"/><path d="M9 13h6M9 16.5h6"/></svg></span><span>制度文件</span></button>
        <button class="nav-item" onclick="location.href='student-stats.html'"><span class="nav-ico"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;display:inline-block;vertical-align:-0.14em"><path d="M3.5 20h17"/><rect x="5" y="11" width="3.2" height="6" rx=".6"/><rect x="10.4" y="6.5" width="3.2" height="10.5" rx=".6"/><rect x="15.8" y="13.5" width="3.2" height="3.5" rx=".6"/></svg></span><span>数据统计</span></button>
        <div class="nav-section-title">帮助</div>
        <button class="nav-item" onclick="location.href='student-dept.html'"><span class="nav-ico"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;display:inline-block;vertical-align:-0.14em"><path d="M5 4h3l1.6 4.2-2 1.4a11 11 0 0 0 4.8 4.8l1.4-2L18 16v3a2 2 0 0 1-2.2 2A15.5 15.5 0 0 1 3 6.2 2 2 0 0 1 5 4z"/></svg></span><span>科室联系方式</span></button>
        <button class="nav-item" onclick="location.href='student-faq.html'"><span class="nav-ico"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;display:inline-block;vertical-align:-0.14em"><circle cx="12" cy="12" r="8.5"/><path d="M9.6 9.2a2.4 2.4 0 1 1 3.3 2.2c-.8.4-1.1.9-1.1 1.8"/><path d="M12 16.6h.01"/></svg></span><span>常见问题</span></button>
      </nav>
      <div class="sidebar-footer">
        <div class="role-badge" id="role-badge">学生视角</div>
        <div class="user-card">
          <div class="user-avatar" id="user-avatar">李</div>
          <div class="user-info"><strong id="user-name">李诚</strong><span id="user-sub">计算机学院</span></div>
        </div>
      </div>
    </aside>
    <div class="main">
      <header class="topbar">
        <div class="topbar-left">
          <button class="icon-btn mobile-menu-btn" id="mobile-menu-btn" aria-label="展开菜单">☰</button>
          <div class="topbar-title">
            <h2 id="page-title">我要写信</h2>
            <div class="breadcrumb" id="breadcrumb">首页 / 我要写信</div>
          </div>
        </div>
        <div class="topbar-actions">
          <div class="mailbox-switch" id="mailbox-switch" style="display:none"></div>
          <div class="role-switch" id="role-switch"><button class="active" onclick="location.href='student-home.html'">学生</button><button class="" onclick="location.href='section-home.html'">科室负责人</button><button class="" onclick="location.href='admin-home.html'">管理员</button></div>
          <button class="btn btn-primary" id="btn-write-quick" onclick="location.href='student-write-notice.html'">＋ 我要写信</button>
        </div>
      </header>
      <main class="content" id="app-content">

    <div class="card">
      <div class="card-header"><h3>填写信件</h3><span class="hint">提交至 学工信箱</span></div>
      <div class="card-body">
        <form id="write-form" novalidate>
          <div class="form-row">
            <div class="form-group"><label class="form-required">姓名</label><input name="name" value="李诚" required></div>
            <div class="form-group"><label class="form-required">证件信息</label><input name="idInfo" value="8201230314" required></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-required">联系电话</label><input name="phone" value="13874105021" required></div>
            <div class="form-group"><label class="form-required">联系邮箱</label><input name="email" type="email" value="licheng@example.edu.cn" required></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label class="form-required">所在单位</label><input name="unit" value="计算机学院" required></div>
            <div class="form-group"><label>联系地址</label><input name="address" value=""></div>
          </div>
          <div class="form-group"><label class="form-required">来信标题</label>
            <input name="title" id="w-title" value="" placeholder="简要概括您的诉求" maxlength="80" required></div>
          <div class="form-row">
            <div class="form-group"><label class="form-required">信件分类</label>
              <select name="category" required><option value="">请选择</option>
                <option >建议类</option><option >问题类</option><option >咨询类</option><option >感谢类</option><option >投诉类</option>
              </select></div>
            <div class="form-group"><label class="form-required">事务分类</label>
              <select name="affair" id="w-affair" required><option value="">请选择</option>
                <option >思想教育</option><option >党团组织</option><option >学籍异动</option><option >请假考勤</option><option >违纪申诉</option><option >奖助学金</option><option >困难认定</option><option >勤工助学</option><option >心理咨询</option><option >心理健康教育</option><option >宿舍管理</option><option >住宿调整</option><option >就业指导</option><option >生涯规划</option><option >创业服务</option><option >征兵入伍</option><option >国防教育</option><option >其他事务</option>
              </select></div>
          </div>
          <p class="dept-hint" id="dept-hint"></p>
          <div class="form-group">
            <div class="rt-label"><label class="form-required" style="margin:0">信件内容</label>
              <button type="button" class="ai-btn" id="btn-ai" title="AI 帮你把语言组织得更清晰得体"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;display:inline-block;vertical-align:-0.14em"><path d="M12 4l1.7 4.3L18 10l-4.3 1.7L12 16l-1.7-4.3L6 10l4.3-1.7z"/><path d="M18.6 15.4l.6 1.6 1.6.6-1.6.6-.6 1.6-.6-1.6-1.6-.6 1.6-.6z"/></svg> AI 润色</button>
            </div>
            <textarea id="w-content" rows="8" maxlength="2000" placeholder="请详细描述事件经过与诉求（不少于10字）"></textarea>
            <div class="char-counter"><span id="char-count">0</span> / 2000</div>
          </div>
          <div class="form-group"><label>附件材料</label>
            <div class="upload-zone" id="upload-zone"><div class="uz-inner"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;display:inline-block;vertical-align:-0.14em"><path d="M20 11.5 12 19.5a4.2 4.2 0 0 1-6-6l8.5-8.5a2.8 2.8 0 0 1 4 4L10 17a1.4 1.4 0 0 1-2-2l7-7"/></svg> 点击或拖拽文件到此处上传（照片 / 文档，可选）</div></div>
            <input type="file" id="upload-input" multiple hidden>
            <div class="up-list" id="upload-list"></div>
          </div>
          <div class="form-group"><label class="form-required">能否公开</label>
            <div class="radio-group">
              <label><input type="radio" name="isPublic" value="yes" checked> 可公开</label>
              <label><input type="radio" name="isPublic" value="no" > 不公开</label>
            </div>
          </div>
          <p class="form-hint warn" id="dup-hint"></p>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">提交信件</button>
            <button type="button" class="btn btn-outline" id="btn-draft">存为草稿</button>
            <button type="button" class="btn btn-ghost" id="btn-cancel">取消</button>
          </div>
        </form>
      </div>
    </div>
      </main>
    </div>
  </div>
  <div class="mask" id="sidebar-mask"></div>
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header"><h3 id="modal-title">详情</h3><button class="modal-close" id="modal-close" aria-label="关闭">&times;</button></div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>
  <output class="toast" id="toast" aria-live="polite"></output>
  <div class="page-stub-note">静态设计稿 · 顶栏/侧栏可点击跳转</div>
  <script>/* 静态设计稿：仅屏蔽内联事件报错，不做任何渲染 */
window.App={toast(){},navigate(){},showModal(){},hideModal(){}};
window.MApp={toast(){},go(){}};</script>
</body>
</html>
