<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学工信箱 移动端 · 更多</title>
  <link rel="stylesheet" href="../assets/css/mobile.css">
  <style>
  /* 设计稿占位：图表槽位 */
  .chart-slot{display:flex;flex-direction:column;align-items:center;justify-content:center;
    border:1.5px dashed #cbd5e1;border-radius:14px;background:#f6f9fb;color:#94a3b8;
    font-size:12px;gap:4px;text-align:center;margin:auto}
  .chart-slot small{font-size:10px;opacity:.75}
  .page-stub-note{position:fixed;right:14px;bottom:12px;z-index:60;background:rgba(15,23,42,.82);
    color:#fff;font-size:11px;line-height:1.4;padding:7px 11px;border-radius:9px;
    font-family:-apple-system,"PingFang SC",sans-serif;box-shadow:0 6px 18px -6px rgba(0,0,0,.4);pointer-events:none}
</style>
</head>
<body>
  <div class="device">
    <div class="phone">
      <div class="statusbar">
        <span class="sb-time" id="sb-time">9:41</span>
        <span class="sb-icons">●●● &#128246; &#128267;</span>
      </div>
      <header class="m-appbar" id="m-appbar">
        <button class="m-back hidden" id="m-back" aria-label="返回">‹</button>
        <div class="m-appbar-title" id="m-title">更多</div>
        <button class="m-appbar-btn" id="m-mailbox-btn" aria-label="切换信箱" style="display:none">&#9662;</button>
      </header>
      <main class="m-main" id="m-content">

    <div class="m-more-user">
      <div class="m-more-avatar">李</div>
      <div><div class="nm">李诚</div><div class="sb">计算机学院</div></div>
    </div>
    <div class="m-section-title">切换身份（演示）</div>
    <div class="m-role-switch">
      <button class="m-role-chip active" data-role="student">学生</button><button class="m-role-chip " data-role="section">科室负责人</button><button class="m-role-chip " data-role="admin">管理员</button>
    </div>
    
    <div class="m-section-title">更多功能</div>
    <div class="m-more-grid">
      <div class="m-more-item" data-more="query" onclick="location.href='query.html'"><div class="ic"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;display:inline-block;vertical-align:-0.14em"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg></div><span>信件查询</span></div><div class="m-more-item" data-more="policy" onclick="location.href='policy.html'"><div class="ic"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;display:inline-block;vertical-align:-0.14em"><path d="M6 2.5h7l5 5V21.5H6z"/><path d="M13 2.5V8h5"/><path d="M9 13h6M9 16.5h6"/></svg></div><span>制度文件</span></div><div class="m-more-item" data-more="stats" onclick="location.href='stats.html'"><div class="ic"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;display:inline-block;vertical-align:-0.14em"><path d="M3.5 20h17"/><rect x="5" y="11" width="3.2" height="6" rx=".6"/><rect x="10.4" y="6.5" width="3.2" height="10.5" rx=".6"/><rect x="15.8" y="13.5" width="3.2" height="3.5" rx=".6"/></svg></div><span>数据统计</span></div><div class="m-more-item" data-more="dept" onclick="location.href='dept.html'"><div class="ic"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;display:inline-block;vertical-align:-0.14em"><path d="M5 4h3l1.6 4.2-2 1.4a11 11 0 0 0 4.8 4.8l1.4-2L18 16v3a2 2 0 0 1-2.2 2A15.5 15.5 0 0 1 3 6.2 2 2 0 0 1 5 4z"/></svg></div><span>科室联系</span></div><div class="m-more-item" data-more="faq" onclick="location.href='faq.html'"><div class="ic"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;display:inline-block;vertical-align:-0.14em"><circle cx="12" cy="12" r="8.5"/><path d="M9.6 9.2a2.4 2.4 0 1 1 3.3 2.2c-.8.4-1.1.9-1.1 1.8"/><path d="M12 16.6h.01"/></svg></div><span>常见问题</span></div>
    </div>
    <p class="m-topnote" style="color:var(--text-muted)">学工信箱移动端原型 · <a href="../app.html" style="color:var(--primary)">前往桌面端</a></p>
      </main>
      <button class="m-fab" id="m-fab" aria-label="我要写信" onclick="location.href='write-notice.html'">＋</button>
      <nav class="m-tabbar" id="m-tabbar">
        <button class="m-tab" onclick="location.href='home.html'"><span class="m-tab-ico"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;display:inline-block;vertical-align:-0.14em"><path d="M4 10.5 12 4l8 6.5"/><path d="M6 9.8V20h12V9.8"/></svg></span><span>首页</span></button>
        <button class="m-tab" onclick="location.href='public.html'"><span class="m-tab-ico"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;display:inline-block;vertical-align:-0.14em"><path d="M4 10v4a1 1 0 0 0 1 1h2l5 4V5L7 9H5a1 1 0 0 0-1 1z"/><path d="M16 9a4.5 4.5 0 0 1 0 6"/></svg></span><span>公开</span></button>
        <div class="m-tab spacer"></div>
        <button class="m-tab" onclick="location.href='my.html'"><span class="m-tab-ico"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;display:inline-block;vertical-align:-0.14em"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3.5 7 8.5 6 8.5-6"/></svg></span><span>我的 (3)</span></button>
        <button class="m-tab active" onclick="location.href='more.html'"><span class="m-tab-ico"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;display:inline-block;vertical-align:-0.14em"><path d="M4 7h16M4 12h16M4 17h16"/></svg></span><span>更多</span></button>
      </nav>
    </div>
  </div>
  <div class="m-sheet-overlay" id="m-sheet">
    <div class="m-sheet">
      <div class="m-sheet-handle"></div>
      <div class="m-sheet-head"><h3 id="m-sheet-title">详情</h3><button class="m-sheet-close" id="m-sheet-close" aria-label="关闭">&times;</button></div>
      <div class="m-sheet-body" id="m-sheet-body"></div>
    </div>
  </div>
  <div class="m-toast" id="m-toast" aria-live="polite"></div>
  <script>/* 静态设计稿：仅屏蔽内联事件报错，不做任何渲染 */
window.App={toast(){},navigate(){},showModal(){},hideModal(){}};
window.MApp={toast(){},go(){}};</script>
</body>
</html>
