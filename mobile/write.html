<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学工信箱 移动端 · 我要写信</title>
  <link rel="stylesheet" href="../assets/css/mobile.css">
  <style>
  /* 设计稿占位：图表槽位 */
  .chart-slot{display:flex;flex-direction:column;align-items:center;justify-content:center;
    border:1.5px dashed #cbd5e1;border-radius:14px;background:#f6f9fb;color:#94a3b8;
    font-size:12px;gap:4px;text-align:center;margin:auto}
  .chart-slot small{font-size:10px;opacity:.75}
  .page-stub-note{position:fixed;right:14px;bottom:12px;z-index:60;background:rgba(15,23,42,.82);
    color:#fff;font-size:11px;line-height:1.4;padding:7px 11px;border-radius:9px;
    font-family:-apple-system,"PingFang SC",sans-serif;box-shadow:0 6px 18px -6px rgba(0,0,0,.4);pointer-events:none}
</style>
</head>
<body>
  <div class="device">
    <div class="phone">
      <div class="statusbar">
        <span class="sb-time" id="sb-time">9:41</span>
        <span class="sb-icons">●●● &#128246; &#128267;</span>
      </div>
      <header class="m-appbar" id="m-appbar">
        <button class="m-back" id="m-back" aria-label="返回" onclick="location.href='home.html'">‹</button>
        <div class="m-appbar-title" id="m-title">我要写信</div>
        <button class="m-appbar-btn" id="m-mailbox-btn" aria-label="切换信箱" style="display:none">&#9662;</button>
      </header>
      <main class="m-main" id="m-content">

    <form id="m-write-form">
      <div class="m-field-2">
        <div class="m-field"><label class="req">姓名</label><input name="name" value="李诚"></div>
        <div class="m-field"><label class="req">证件信息</label><input name="idInfo" value="8201230314"></div>
      </div>
      <div class="m-field-2">
        <div class="m-field"><label class="req">联系电话</label><input name="phone" value="13874105021"></div>
        <div class="m-field"><label class="req">联系邮箱</label><input name="email" value="licheng@example.edu.cn"></div>
      </div>
      <div class="m-field"><label class="req">所在单位</label><input name="unit" value="计算机学院"></div>
      <div class="m-field"><label class="req">来信标题</label><input name="title" id="mw-title" value="" placeholder="简要概括诉求" maxlength="80"></div>
      <div class="m-field-2">
        <div class="m-field"><label class="req">信件分类</label>
          <select name="category"><option value="">请选择</option><option >建议类</option><option >问题类</option><option >咨询类</option><option >感谢类</option><option >投诉类</option></select></div>
        <div class="m-field"><label class="req">事务分类</label>
          <select name="affair" id="mw-affair"><option value="">请选择</option><option >思想教育</option><option >党团组织</option><option >学籍异动</option><option >请假考勤</option><option >违纪申诉</option><option >奖助学金</option><option >困难认定</option><option >勤工助学</option><option >心理咨询</option><option >心理健康教育</option><option >宿舍管理</option><option >住宿调整</option><option >就业指导</option><option >生涯规划</option><option >创业服务</option><option >征兵入伍</option><option >国防教育</option><option >其他事务</option></select></div>
      </div>
      <div class="m-hint" id="mw-dept"></div>
      <div class="m-field">
        <div class="m-rt-label"><label class="req" style="margin:0">信件内容</label><button type="button" class="m-ai-btn" id="mw-ai"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;display:inline-block;vertical-align:-0.14em"><path d="M12 4l1.7 4.3L18 10l-4.3 1.7L12 16l-1.7-4.3L6 10l4.3-1.7z"/><path d="M18.6 15.4l.6 1.6 1.6.6-1.6.6-.6 1.6-.6-1.6-1.6-.6 1.6-.6z"/></svg> AI 润色</button></div>
        <textarea id="mw-content" rows="6" maxlength="2000" placeholder="请详细描述事件经过与诉求（不少于10字）"></textarea>
        <div class="m-char"><span id="mw-count">0</span> / 2000</div>
      </div>
      <div class="m-field"><label>附件材料</label>
        <div class="m-upload" id="mw-upload"><div class="uz-inner"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;display:inline-block;vertical-align:-0.14em"><path d="M20 11.5 12 19.5a4.2 4.2 0 0 1-6-6l8.5-8.5a2.8 2.8 0 0 1 4 4L10 17a1.4 1.4 0 0 1-2-2l7-7"/></svg> 点击或拖拽上传附件（照片 / 文档，可选）</div></div>
        <input type="file" id="mw-upload-input" multiple hidden>
        <div class="up-list" id="mw-upload-list"></div>
      </div>
      <div class="m-field"><label class="req">能否公开</label>
        <div class="m-radio">
          <label><input type="radio" name="isPublic" value="yes" checked><span>可公开</span></label>
          <label><input type="radio" name="isPublic" value="no" ><span>不公开</span></label>
        </div>
      </div>
      <div class="m-hint warn" id="mw-dup"></div>
      <div class="m-btn-row" style="margin-top:8px">
        <button type="button" class="m-btn m-btn-outline" id="mw-draft">存草稿</button>
        <button type="submit" class="m-btn m-btn-primary">提交信件</button>
      </div>
    </form>
      </main>
      <button class="m-fab" id="m-fab" aria-label="我要写信" onclick="location.href='write-notice.html'">＋</button>
      <nav class="m-tabbar" id="m-tabbar">
        <button class="m-tab" onclick="location.href='home.html'"><span class="m-tab-ico"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;display:inline-block;vertical-align:-0.14em"><path d="M4 10.5 12 4l8 6.5"/><path d="M6 9.8V20h12V9.8"/></svg></span><span>首页</span></button>
        <button class="m-tab" onclick="location.href='public.html'"><span class="m-tab-ico"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;display:inline-block;vertical-align:-0.14em"><path d="M4 10v4a1 1 0 0 0 1 1h2l5 4V5L7 9H5a1 1 0 0 0-1 1z"/><path d="M16 9a4.5 4.5 0 0 1 0 6"/></svg></span><span>公开</span></button>
        <div class="m-tab spacer"></div>
        <button class="m-tab" onclick="location.href='my.html'"><span class="m-tab-ico"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;display:inline-block;vertical-align:-0.14em"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3.5 7 8.5 6 8.5-6"/></svg></span><span>我的 (3)</span></button>
        <button class="m-tab" onclick="location.href='more.html'"><span class="m-tab-ico"><svg class="ico-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;display:inline-block;vertical-align:-0.14em"><path d="M4 7h16M4 12h16M4 17h16"/></svg></span><span>更多</span></button>
      </nav>
    </div>
  </div>
  <div class="m-sheet-overlay" id="m-sheet">
    <div class="m-sheet">
      <div class="m-sheet-handle"></div>
      <div class="m-sheet-head"><h3 id="m-sheet-title">详情</h3><button class="m-sheet-close" id="m-sheet-close" aria-label="关闭">&times;</button></div>
      <div class="m-sheet-body" id="m-sheet-body"></div>
    </div>
  </div>
  <div class="m-toast" id="m-toast" aria-live="polite"></div>
  <script>/* 静态设计稿：仅屏蔽内联事件报错，不做任何渲染 */
window.App={toast(){},navigate(){},showModal(){},hideModal(){}};
window.MApp={toast(){},go(){}};</script>
</body>
</html>
